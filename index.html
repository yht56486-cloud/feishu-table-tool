<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKF 订单表转换 · 自动识别版</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    margin: 0; padding: 24px;
    max-width: 960px; margin: 0 auto;
    font-size: 14px;
    color: #1f2329;
    background: #f7f8fa;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #eef0f2;
  }
  h1 { font-size: 20px; margin: 0 0 8px; font-weight: 500; }
  h2 { font-size: 15px; margin: 0 0 10px; font-weight: 500; }
  .subtitle { color: #8f959e; font-size: 13px; margin-bottom: 20px; }
  .hint { font-size: 12px; color: #8f959e; margin: 4px 0; }
  button {
    background: #fff; border: 1px solid #dee0e3; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: #f5f6f7; }
  button.primary { background: #3370ff; color: #fff; border-color: #3370ff; }
  button.primary:hover { background: #2860e1; }
  button.copy-big {
    font-size: 14px; padding: 10px 24px;
    background: #3370ff; color: #fff; border-color: #3370ff;
  }
  .meta-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 12px 0;
  }
  .meta-item {
    background: #f7f8fa; padding: 10px 12px; border-radius: 4px;
  }
  .meta-label { font-size: 11px; color: #8f959e; margin-bottom: 2px; }
  .meta-value { font-size: 14px; font-weight: 500; color: #1f2329; }
  .meta-empty { color: #c64040; font-weight: 400; font-size: 12px; }
  #tableWrap { max-height: 400px; overflow: auto; border: 1px solid #eef0f2; border-radius: 4px; }
  table { border-collapse: collapse; font-size: 12px; width: 100%; }
  th, td { padding: 6px 10px; border: 1px solid #eef0f2; text-align: left; }
  th { background: #f7f8fa; position: sticky; top: 0; font-weight: 500; color: #646a73; }
  #status {
    padding: 10px 14px; border-radius: 4px;
    background: #f0f2f5; font-size: 12px; color: #646a73;
  }
  .status-err { background: #fff0f0 !important; color: #c64040 !important; }
  .status-ok { background: #e8f6ea !important; color: #1a7f3e !important; }
  .export-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .paste-hint {
    background: #f0f7ff; border: 1px solid #d1e3fd;
    border-radius: 4px; padding: 10px 12px; font-size: 12px;
    color: #1456f0; margin-top: 10px; line-height: 1.6;
  }
  .warning {
    background: #fff7e6; border: 1px solid #ffd591; border-radius: 4px;
    padding: 10px 12px; font-size: 12px; color: #8a5a00; margin-top: 8px;
  }
</style>
</head>
<body>
 
<h1>BKF 订单表 → 飞书多维表格</h1>
<p class="subtitle">上传一个订单表 xlsx，自动提取所有字段，展开成飞书能直接粘贴的格式</p>
 
<div class="card">
  <h2>① 上传订单表</h2>
  <div class="hint" style="margin-bottom: 10px;">固定模板：款式号在 B2，日期在 J2，颜色×尺码矩阵从 D3 开始</div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" />
</div>
 
<div class="card" id="metaCard" style="display:none;">
  <h2>② 识别结果</h2>
  <div class="meta-grid" id="metaGrid"></div>
  <div id="warnings"></div>
</div>
 
<div class="card" id="previewCard" style="display:none;">
  <h2>③ 展开后的记录 <span id="rowCount" style="font-size: 12px; color: #8f959e; font-weight: 400;"></span></h2>
  <div id="tableWrap"></div>
  <div class="export-actions">
    <button id="copyBtn" class="copy-big">📋 一键复制（含表头）</button>
    <button id="copyNoHeaderBtn">复制不含表头</button>
    <button id="csvBtn">下载 CSV</button>
    <button id="xlsxBtn">下载 Excel</button>
  </div>
  <div class="paste-hint">
    <strong>贴回飞书步骤：</strong><br>
    ① 打开飞书多维表格 → 定位到空白行的第一个单元格<br>
    ② Ctrl/Cmd+V 粘贴 → 飞书会自动识别各字段<br>
    ③ 检查订单编号、日期等字段是否正确
  </div>
</div>
 
<div id="status">请上传订单表 xlsx 文件</div>
 
<script>
(function(){
  let resultData = [];
  let headerRow = ['订单编号', '款式', '品类', '颜色', '尺码', '件数', '日期'];
 
  const $ = id => document.getElementById(id);
  const setStatus = (msg, type) => {
    const el = $('status');
    el.textContent = msg;
    el.className = type === 'err' ? 'status-err' : type === 'ok' ? 'status-ok' : '';
  };
 
  // Excel 日期序列号 → YYYY-MM-DD
  function excelDateToStr(serial) {
    if (typeof serial !== 'number' || isNaN(serial)) return String(serial);
    // Excel base: 1899-12-30
    const ms = (serial - 25569) * 86400 * 1000;
    const d = new Date(ms);
    if (isNaN(d.getTime())) return String(serial);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
 
  // 从 "BKF - 马甲 - 1" 解析出 "BKF马甲" 和序号 "1"
  function parseOrderTitle(raw) {
    const s = String(raw || '').trim();
    const parts = s.split(/\s*-\s*/);
    if (parts.length >= 2) {
      const last = parts[parts.length - 1].trim();
      // 末尾是否为纯数字序号
      if (/^\d+$/.test(last)) {
        const category = parts.slice(0, -1).map(p => p.trim()).join('');
        return { category, seq: last };
      }
    }
    return { category: s.replace(/\s*-\s*/g, ''), seq: '' };
  }
 
  $('fileInput').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type: 'array', cellDates: false});
      // 默认读第一个 sheet，或找叫"订单"的
      let sheetName = wb.SheetNames[0];
      if (wb.SheetNames.includes('订单')) sheetName = '订单';
      const ws = wb.Sheets[sheetName];
 
      // 读取指定单元格
      const getCell = ref => {
        const c = ws[ref];
        return c ? c.v : undefined;
      };
 
      // 提取公共字段
      const title = getCell('A1');                      // "BKF - 马甲 - 1"
      const styleNo = getCell('B2');                    // 2607
      const brand = getCell('D2');                      // 品牌（可能空）
      const totalQty = getCell('H2');                   // 1440
      const dateRaw = getCell('J2');                    // 46099
      const dateStr = excelDateToStr(dateRaw);
      const { category, seq } = parseOrderTitle(title);
      const orderNo = seq ? `${styleNo}-${seq}` : String(styleNo || '');
 
      // 提取尺码表头（E3~J3，可能延伸）
      const sizes = [];
      const sizeCols = ['E', 'F', 'G', 'H', 'I', 'J'];
      for (const col of sizeCols) {
        const v = getCell(col + '3');
        if (v) sizes.push({col, size: String(v).trim()});
      }
 
      // 提取颜色行（D4 向下找，直到 D 列为空或遇到"码总数"）
      const colors = [];
      for (let r = 4; r <= 13; r++) {
        const v = getCell('D' + r);
        if (!v) continue;
        const s = String(v).trim();
        if (!s || s.includes('码总数') || s.includes('合计') || s.includes('总数')) break;
        colors.push({row: r, color: s});
      }
 
      // 展开矩阵
      resultData = [];
      for (const {row, color} of colors) {
        for (const {col, size} of sizes) {
          const qty = getCell(col + row);
          if (qty === undefined || qty === null || qty === '' || qty === 0) continue;
          resultData.push([orderNo, String(styleNo||''), category, color, size, qty, dateStr]);
        }
      }
 
      // 渲染元信息卡
      const metaGrid = $('metaGrid');
      const mkItem = (label, value, warn) => {
        const empty = value === undefined || value === null || value === '';
        return `<div class="meta-item">
          <div class="meta-label">${label}</div>
          <div class="meta-value ${empty ? 'meta-empty' : ''}">${empty ? '(未提取到)' : value}</div>
        </div>`;
      };
      metaGrid.innerHTML =
        mkItem('订单编号', orderNo) +
        mkItem('款式号', styleNo) +
        mkItem('品类', category) +
        mkItem('日期', dateStr) +
        mkItem('总件数', totalQty) +
        mkItem('颜色数', colors.length) +
        mkItem('尺码数', sizes.length) +
        mkItem('展开行数', resultData.length);
 
      // 警告
      const warns = [];
      if (!styleNo) warns.push('款式号（B2）为空');
      if (!title) warns.push('订单标题（A1）为空');
      if (!sizes.length) warns.push('未识别到尺码表头（E3~J3）');
      if (!colors.length) warns.push('未识别到颜色行（D4 向下）');
      if (totalQty && resultData.length) {
        const sum = resultData.reduce((a, r) => a + (Number(r[5]) || 0), 0);
        if (sum !== totalQty) warns.push(`展开后件数合计 ${sum}，与 H2 的总件数 ${totalQty} 不一致，请核对是否有空值或异常值`);
      }
      $('warnings').innerHTML = warns.length ? `<div class="warning">⚠ ${warns.join('；')}</div>` : '';
 
      $('metaCard').style.display = 'block';
      $('previewCard').style.display = 'block';
      $('rowCount').textContent = `· ${resultData.length} 条`;
      renderPreview();
      setStatus(`✓ 识别完成：${colors.length} 色 × ${sizes.length} 码，共 ${resultData.length} 条记录`, 'ok');
    } catch(err) {
      setStatus('读取失败：' + err.message, 'err');
      console.error(err);
    }
  });
 
  function renderPreview() {
    let html = '<table><thead><tr>';
    headerRow.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    resultData.slice(0, 100).forEach(r => {
      html += '<tr>';
      r.forEach(v => html += `<td>${escapeHtml(String(v))}</td>`);
      html += '</tr>';
    });
    if (resultData.length > 100) {
      html += `<tr><td colspan="${headerRow.length}" style="text-align:center; color:#8f959e;">… 还有 ${resultData.length - 100} 条</td></tr>`;
    }
    html += '</tbody></table>';
    $('tableWrap').innerHTML = html;
  }
 
  // 复制（三重降级：navigator.clipboard → execCommand → 手动文本框）
  async function copyToClipboard(includeHeader) {
    const lines = [];
    if (includeHeader) lines.push(headerRow.join('\t'));
    resultData.forEach(r => lines.push(r.join('\t')));
    const text = lines.join('\n');
 
    // 方法 1：现代 API
    try {
      await navigator.clipboard.writeText(text);
      setStatus(`✓ 已复制 ${resultData.length} 条${includeHeader ? '（含表头）' : '（不含表头）'}到剪贴板`, 'ok');
      return;
    } catch(e) {
      console.warn('clipboard API failed, falling back:', e);
    }
 
    // 方法 2：老式 execCommand
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) {
        setStatus(`✓ 已复制 ${resultData.length} 条到剪贴板（降级模式）`, 'ok');
        return;
      }
    } catch(e) {
      console.warn('execCommand failed:', e);
    }
 
    // 方法 3：手动复制（显示一个可选中的大文本框）
    showManualCopyBox(text);
  }
 
  function showManualCopyBox(text) {
    let box = document.getElementById('manualCopyBox');
    if (!box) {
      box = document.createElement('div');
      box.id = 'manualCopyBox';
      box.style.cssText = 'margin-top: 12px; padding: 12px; border: 2px solid #3370ff; border-radius: 4px; background: #fff;';
      box.innerHTML = `
        <div style="font-size: 12px; color: #1456f0; margin-bottom: 6px;">
          <strong>飞书禁用了自动复制，请手动复制：</strong>点击下方文本框 → Ctrl+A 全选 → Ctrl+C 复制 → 去飞书表格粘贴
        </div>
        <textarea id="manualCopyText" readonly style="width: 100%; height: 120px; font-family: Menlo, monospace; font-size: 11px; padding: 8px; border: 1px solid #dee0e3; border-radius: 4px;"></textarea>
      `;
      $('previewCard').appendChild(box);
    }
    const ta = document.getElementById('manualCopyText');
    ta.value = text;
    ta.focus();
    ta.select();
    setStatus(`自动复制失败，已为你准备好文本，请在下方文本框手动 Ctrl+A 全选后 Ctrl+C 复制`, 'err');
    box.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
  $('copyBtn').addEventListener('click', () => copyToClipboard(true));
  $('copyNoHeaderBtn').addEventListener('click', () => copyToClipboard(false));
 
  $('csvBtn').addEventListener('click', () => {
    const all = [headerRow, ...resultData];
    const csv = all.map(r => r.map(c => {
      const s = String(c ?? '');
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'order-expanded.csv'; a.click();
    URL.revokeObjectURL(url);
  });
 
  $('xlsxBtn').addEventListener('click', () => {
    const all = [headerRow, ...resultData];
    const ws = XLSX.utils.aoa_to_sheet(all);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Expanded');
    XLSX.writeFile(wb, 'order-expanded.xlsx');
  });
 
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
})();
</script>
</body>
</html>
