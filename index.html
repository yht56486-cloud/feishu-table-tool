<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表格速读 · 批量订单识别与写入</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module">
  const cdnList = [
    'https://esm.sh/@lark-base-open/js-sdk@1.0.2',
    'https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk@1.0.2/+esm',
    'https://unpkg.com/@lark-base-open/js-sdk@1.0.2?module'
  ];
  window.__sdkLog = [];
  for (const url of cdnList) {
    try {
      window.__sdkLog.push('尝试 ' + url);
      const mod = await import(url);
      if (mod && mod.bitable) {
        window.bitable = mod.bitable;
        window.__sdkLoaded = true;
        window.__sdkLog.push('成功 ' + url);
        window.dispatchEvent(new CustomEvent('sdk-ready'));
        break;
      }
    } catch (e) {
      window.__sdkLog.push('失败 ' + url + ': ' + (e.message || e));
    }
  }
  if (!window.__sdkLoaded) {
    window.__sdkError = window.__sdkLog.join('\n');
    window.dispatchEvent(new CustomEvent('sdk-error'));
  }
</script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    margin: 0 auto; padding: 20px; max-width: 960px;
    font-size: 14px; color: #1f2329; background: #f7f8fa;
  }
  .card { background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 14px; border: 1px solid #eef0f2; }
  h1 { font-size: 18px; margin: 0 0 4px; font-weight: 500; }
  h2 { font-size: 14px; margin: 0 0 10px; font-weight: 500; }
  .subtitle { color: #8f959e; font-size: 12px; margin-bottom: 16px; }
  .hint { font-size: 12px; color: #8f959e; margin: 4px 0; }
  button {
    background: #fff; border: 1px solid #dee0e3; padding: 5px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  button:hover:not(:disabled) { background: #f5f6f7; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #3370ff; color: #fff; border-color: #3370ff; }
  button.primary:hover:not(:disabled) { background: #2860e1; }
  button.big { font-size: 14px; padding: 8px 20px; }
  button.danger { color: #c64040; border-color: #ffa7a7; }
  button.danger:hover:not(:disabled) { background: #fff0f0; }

  #sdkBanner { margin: 0 0 12px; padding: 8px 12px; border-radius: 4px; background: #fff4e5; color: #8a5a00; font-size: 12px; border: 1px solid #ffd591; }

  .order-card { background: #fff; border: 1px solid #eef0f2; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; }
  .order-card.status-ready { border-left: 3px solid #faad14; }
  .order-card.status-error { border-left: 3px solid #c64040; background: #fffafa; }
  .order-card.status-writing { border-left: 3px solid #3370ff; background: #f0f7ff; }
  .order-card.status-done { border-left: 3px solid #52c41a; background: #f6ffed; }
  .order-card.status-skipped { border-left: 3px solid #bfbfbf; opacity: 0.6; }
  .oc-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .oc-filename { font-weight: 500; font-size: 13px; }
  .oc-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0f2f5; color: #646a73; font-weight: 400; }
  .oc-badge.ready { background: #fff7e6; color: #8a5a00; }
  .oc-badge.error { background: #fff0f0; color: #c64040; }
  .oc-badge.writing { background: #e1ebff; color: #1456f0; }
  .oc-badge.done { background: #e8f6ea; color: #1a7f3e; }
  .oc-badge.skipped { background: #f0f2f5; color: #8f959e; }
  .oc-meta { font-size: 12px; color: #646a73; line-height: 1.7; margin-bottom: 8px; }
  .oc-meta strong { color: #1f2329; font-weight: 500; }
  .oc-warn { background: #fff7e6; border: 1px solid #ffd591; border-radius: 4px; padding: 6px 10px; font-size: 11px; color: #8a5a00; margin: 6px 0; }
  .oc-err { background: #fff0f0; border: 1px solid #ffa7a7; border-radius: 4px; padding: 6px 10px; font-size: 11px; color: #c64040; margin: 6px 0; }
  .oc-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .oc-preview { display: none; margin-top: 8px; }
  .oc-preview.open { display: block; }
  .oc-preview table { font-size: 11px; border-collapse: collapse; width: 100%; }
  .oc-preview th, .oc-preview td { padding: 3px 6px; border: 1px solid #eef0f2; }
  .oc-preview th { background: #f7f8fa; color: #646a73; font-weight: 400; }
  .oc-preview-wrap { max-height: 200px; overflow: auto; border: 1px solid #eef0f2; border-radius: 4px; }

  input[type="text"], select { padding: 4px 8px; border: 1px solid #dee0e3; border-radius: 4px; font-size: 12px; }
  .mapping-grid { display: grid; grid-template-columns: 80px 1fr; gap: 6px 10px; align-items: center; font-size: 12px; }

  #batchBar { position: sticky; top: 0; z-index: 10; background: #fff; padding: 10px 14px; border: 1px solid #eef0f2; border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .stats { font-size: 12px; color: #646a73; }
  .stats span { margin-right: 10px; }
  .stats .s-ready { color: #8a5a00; }
  .stats .s-error { color: #c64040; }
  .stats .s-done { color: #1a7f3e; }

  #status { padding: 8px 12px; border-radius: 4px; background: #f0f2f5; font-size: 12px; color: #646a73; margin-top: 10px; }
  .status-err { background: #fff0f0 !important; color: #c64040 !important; }
  .status-ok { background: #e8f6ea !important; color: #1a7f3e !important; }
</style>
</head>
<body>

<h1>表格速读</h1>
<p class="subtitle">批量上传订单表 xlsx，自动识别后逐个写入飞书多维表格</p>

<div id="sdkBanner">
  <strong>飞书连接状态：</strong><span id="sdkStatus">启动中…</span>
  <button id="reloadBtn" style="float: right; font-size: 11px; padding: 2px 8px;">重连</button>
  <details id="sdkDetails" style="margin-top: 6px; display: none;">
    <summary style="cursor: pointer; font-size: 11px;">详细日志</summary>
    <pre id="sdkLog" style="font-size: 10px; white-space: pre-wrap; margin: 6px 0 0;"></pre>
  </details>
</div>

<div class="card">
  <h2>① 上传订单表（可多选）</h2>
  <div class="hint" style="margin-bottom: 8px;">固定模板：A1 订单标题、B2 款式、J2 日期、D3 起为颜色×尺码矩阵。可一次选多个文件，或分批追加</div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" multiple />
  <button id="clearBtn" style="margin-left: 8px;" class="danger">清空全部</button>
</div>

<div class="card" id="mappingCard" style="display:none;">
  <h2>② 字段映射（本地 → 飞书）· 所有订单共用</h2>
  <div id="mappingGrid" class="mapping-grid"></div>
</div>

<div class="card" id="ordersCard" style="display:none;">
  <div id="batchBar">
    <div class="stats" id="stats"></div>
    <div style="margin-left: auto; display: flex; gap: 6px;">
      <button id="writeAllBtn" class="primary big">✨ 全部写入飞书</button>
    </div>
  </div>
  <div id="ordersList"></div>
</div>

<div id="status">请上传一个或多个订单表 xlsx 文件</div>

<script>
(function(){
  let orders = [];
  let nextId = 1;
  let feishuFields = [];
  const localFields = ['订单编号', '电子版版号', '款式', '颜色', '尺码', '件数', '日期'];
  const aliases = {
    '订单编号': ['订单编号', '订单号', '编号'],
    '电子版版号': ['电子版版号', '版号', '版型', '版型号'],
    '款式': ['款式', '款式名称', '款号', '品类', '品名', '类别', '文本 7', '文本7', '品种'],
    '颜色': ['颜色', '色'],
    '尺码': ['尺码', '尺寸', 'size'],
    '件数': ['件数', '数量', '数', 'qty', 'quantity'],
    '日期': ['日期', '时间', 'date'],
  };

  const $ = id => document.getElementById(id);
  const setStatus = (msg, type) => {
    const el = $('status');
    el.textContent = msg;
    el.className = type === 'err' ? 'status-err' : type === 'ok' ? 'status-ok' : '';
  };

  $('fileInput').addEventListener('change', async e => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    for (const file of files) await processFile(file);
    e.target.value = '';
    refreshUI();
  });

  $('clearBtn').addEventListener('click', () => {
    if (!orders.length) return;
    if (confirm(`清空全部 ${orders.length} 个订单？（已写入飞书的不会删除）`)) {
      orders = [];
      refreshUI();
      setStatus('已清空', '');
    }
  });

  async function processFile(file) {
    const id = nextId++;
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type: 'array', cellDates: false});
      let sheetName = wb.SheetNames[0];
      if (wb.SheetNames.includes('订单')) sheetName = '订单';
      const ws = wb.Sheets[sheetName];
      const result = extractOrder(ws);
      orders.push({ id, filename: file.name, status: result.errorMsg ? 'error' : 'ready', ...result });
    } catch (e) {
      orders.push({
        id, filename: file.name, status: 'error',
        meta: {}, records: [], warnings: [],
        errorMsg: '读取失败：' + (e.message || String(e))
      });
    }
  }

  function excelDateToStr(serial) {
    if (typeof serial !== 'number' || isNaN(serial)) return String(serial);
    const ms = (serial - 25569) * 86400 * 1000;
    const d = new Date(ms);
    if (isNaN(d.getTime())) return String(serial);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }

  function parseOrderTitle(raw) {
    const s = String(raw || '').trim();
    const parts = s.split(/\s*-\s*/);
    if (parts.length >= 2) {
      const last = parts[parts.length - 1].trim();
      if (/^\d+$/.test(last)) {
        const category = parts.slice(0, -1).map(p => p.trim()).join('');
        return { category, seq: last };
      }
    }
    return { category: s.replace(/\s*-\s*/g, ''), seq: '' };
  }

  function extractOrder(ws) {
    const getCell = ref => {
      const c = ws[ref];
      return c ? c.v : undefined;
    };
    const title = getCell('A1');
    const styleNo = getCell('B2');
    const totalQty = getCell('H2');
    const dateRaw = getCell('J2');
    const dateStr = excelDateToStr(dateRaw);
    const { category, seq } = parseOrderTitle(title);
    const orderNo = seq ? `${category}-${seq}` : category;

    // 尺码：从 E 列开始扫描第 3 行，遇到"总件/合计"停止。支持任意数量尺码
    const sizes = [];
    const colLetter = n => {
      let s = ''; n = n + 1;
      while (n > 0) { s = String.fromCharCode(65 + (n-1) % 26) + s; n = Math.floor((n-1)/26); }
      return s;
    };
    // 从 E 列（index=4）开始扫最多 20 列
    for (let i = 4; i < 24; i++) {
      const col = colLetter(i);
      const v = getCell(col + '3');
      if (v === undefined || v === null || v === '') break;  // 遇空停止
      const s = String(v).trim();
      if (/总件|合计|总数|total/i.test(s)) break;  // 遇总件列停止
      sizes.push({col, size: s});
    }

    // 颜色：从第 4 行向下扫，最多扫 30 行（之前限制 13 行会漏颜色多的订单）
    const colors = [];
    for (let r = 4; r <= 34; r++) {
      const v = getCell('D' + r);
      if (!v) continue;
      const s = String(v).trim();
      if (/码总数|合计|总数|total/i.test(s)) break;
      colors.push({row: r, color: s});
    }

    const records = [];
    for (const {row, color} of colors) {
      for (const {col, size} of sizes) {
        const qty = getCell(col + row);
        if (qty === undefined || qty === null || qty === '' || qty === 0) continue;
        records.push([orderNo, String(styleNo||''), category, color, size, qty, dateStr]);
      }
    }

    const warnings = [];
    let errorMsg = '';
    if (!styleNo) warnings.push('版号（B2）为空');
    if (!title) errorMsg = '订单标题（A1）为空';
    else if (!sizes.length) errorMsg = '未识别到尺码表头（E3~J3）';
    else if (!colors.length) errorMsg = '未识别到颜色行（D4 向下）';
    else if (totalQty && records.length) {
      const sum = records.reduce((a, r) => a + (Number(r[5]) || 0), 0);
      if (sum !== totalQty) {
        errorMsg = `展开后件数合计 ${sum}，与总件数 ${totalQty} 不一致`;
      }
    }

    return {
      meta: { orderNo, styleNo, category, dateStr, totalQty, colorCount: colors.length, sizeCount: sizes.length },
      records, warnings, errorMsg
    };
  }

  function refreshUI() {
    renderStats();
    renderOrders();
    $('ordersCard').style.display = orders.length ? 'block' : 'none';
    $('mappingCard').style.display = orders.length && feishuFields.length ? 'block' : 'none';
    if (feishuFields.length && orders.length) renderMapping();
    const hasError = orders.some(o => o.status === 'error');
    const hasReady = orders.some(o => o.status === 'ready');
    const btn = $('writeAllBtn');
    btn.disabled = hasError || !hasReady || !feishuFields.length;
    if (hasError) btn.title = '有订单识别失败，修复或移除后才能批量写入';
    else if (!feishuFields.length) btn.title = '未连接飞书';
    else if (!hasReady) btn.title = '没有待写入的订单';
    else btn.title = '';
  }

  function renderStats() {
    const count = (s) => orders.filter(o => o.status === s).length;
    const ready = count('ready'), err = count('error'), done = count('done'), skip = count('skipped');
    $('stats').innerHTML = `共 <strong>${orders.length}</strong> 个订单`
      + (ready ? ` · <span class="s-ready">待写入 ${ready}</span>` : '')
      + (err ? ` · <span class="s-error">识别有误 ${err}</span>` : '')
      + (done ? ` · <span class="s-done">已写入 ${done}</span>` : '')
      + (skip ? ` · 已跳过 ${skip}` : '');
  }

  function renderOrders() {
    const wrap = $('ordersList');
    wrap.innerHTML = orders.map(renderOrderCard).join('');
    orders.forEach(o => {
      const card = document.getElementById('order-' + o.id);
      if (!card) return;
      const q = sel => card.querySelector(sel);
      q('.btn-preview') && q('.btn-preview').addEventListener('click', () => q('.oc-preview').classList.toggle('open'));
      q('.btn-write') && q('.btn-write').addEventListener('click', () => writeOne(o.id));
      q('.btn-skip') && q('.btn-skip').addEventListener('click', () => {
        o.status = o.status === 'skipped' ? 'ready' : 'skipped';
        refreshUI();
      });
      q('.btn-remove') && q('.btn-remove').addEventListener('click', () => {
        orders = orders.filter(x => x.id !== o.id);
        refreshUI();
      });
    });
  }

  function renderOrderCard(o) {
    const badgeText = {ready:'待写入', error:'识别有误', writing:'写入中…', done:'已写入', skipped:'已跳过'}[o.status];
    const m = o.meta || {};
    const metaLine = o.status === 'error' && !m.orderNo ? '' : `
      <div class="oc-meta">
        <strong>${escapeHtml(m.orderNo || '-')}</strong> · 版号 ${escapeHtml(String(m.styleNo || '-'))} · 款式 ${escapeHtml(m.category || '-')} · 日期 ${escapeHtml(m.dateStr || '-')}<br>
        ${m.colorCount || 0} 色 × ${m.sizeCount || 0} 码 = <strong>${o.records.length} 条</strong>，合计 <strong>${m.totalQty || 0}</strong> 件
      </div>
    `;
    const warnBlock = o.warnings && o.warnings.length ? `<div class="oc-warn">⚠ ${o.warnings.map(escapeHtml).join('；')}</div>` : '';
    const errBlock = o.errorMsg ? `<div class="oc-err">✕ ${escapeHtml(o.errorMsg)}</div>` : '';

    let actions = '';
    if (o.status === 'ready') {
      actions = `<button class="btn-preview">预览</button><button class="btn-write primary">写入飞书</button><button class="btn-skip">跳过</button><button class="btn-remove danger">移除</button>`;
    } else if (o.status === 'error') {
      actions = `<button class="btn-remove danger">移除</button>`;
    } else if (o.status === 'done') {
      actions = `<button class="btn-preview">预览</button><button class="btn-remove">从列表移除</button>`;
    } else if (o.status === 'skipped') {
      actions = `<button class="btn-skip">取消跳过</button><button class="btn-remove danger">移除</button>`;
    } else if (o.status === 'writing') {
      actions = `<span style="color: #1456f0; font-size: 12px;">写入中，请勿关闭…</span>`;
    }

    const previewBlock = o.records.length ? `
      <div class="oc-preview">
        <div class="oc-preview-wrap">
          <table>
            <thead><tr>${['订单编号','电子版版号','款式','颜色','尺码','件数','日期'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
            <tbody>
              ${o.records.slice(0, 50).map(r => `<tr>${r.map(v=>`<td>${escapeHtml(String(v))}</td>`).join('')}</tr>`).join('')}
              ${o.records.length > 50 ? `<tr><td colspan="7" style="text-align:center;color:#8f959e;">… 还有 ${o.records.length-50} 条</td></tr>` : ''}
            </tbody>
          </table>
        </div>
      </div>
    ` : '';

    return `
      <div class="order-card status-${o.status}" id="order-${o.id}">
        <div class="oc-head">
          <div class="oc-filename">📄 ${escapeHtml(o.filename)}</div>
          <span class="oc-badge ${o.status}">${badgeText}</span>
        </div>
        ${metaLine}
        ${warnBlock}
        ${errBlock}
        <div class="oc-actions">${actions}</div>
        ${previewBlock}
      </div>
    `;
  }

  function renderMapping() {
    const grid = $('mappingGrid');
    const currentMap = getMapping();
    let html = '';
    localFields.forEach(local => {
      const opts = ['<option value="__skip__">（不写入）</option>'].concat(
        feishuFields.map(f => `<option value="${f.id}">${escapeHtml(f.name)}</option>`)
      ).join('');
      html += `<label>${local}</label><select data-local="${local}">${opts}</select>`;
    });
    grid.innerHTML = html;
    grid.querySelectorAll('select').forEach(sel => {
      const local = sel.dataset.local;
      if (currentMap[local]) { sel.value = currentMap[local]; return; }
      const kws = aliases[local] || [local];
      for (const f of feishuFields) {
        if (kws.some(k => f.name.toLowerCase().includes(k.toLowerCase()))) {
          sel.value = f.id;
          break;
        }
      }
    });
  }

  function getMapping() {
    const m = {};
    document.querySelectorAll('#mappingGrid select').forEach(sel => {
      const fid = sel.value;
      if (fid && fid !== '__skip__') m[sel.dataset.local] = fid;
    });
    return m;
  }

  async function writeOne(orderId) {
    const o = orders.find(x => x.id === orderId);
    if (!o || o.status !== 'ready') return;
    const mapping = getMapping();
    if (!Object.keys(mapping).length) { setStatus('请至少映射一个字段', 'err'); return; }

    o.status = 'writing';
    refreshUI();
    try {
      await writeRecords(o.records, mapping);
      o.status = 'done';
      setStatus(`✓ 订单 ${o.meta.orderNo} 写入成功（${o.records.length} 条）`, 'ok');
    } catch (e) {
      o.status = 'ready';
      o.errorMsg = '写入失败：' + (e.message || String(e));
      setStatus('写入失败：' + (e.message || String(e)) + '（F12 查控制台）', 'err');
      console.error(e);
    }
    refreshUI();
  }

  async function writeAll() {
    const mapping = getMapping();
    if (!Object.keys(mapping).length) { setStatus('请至少映射一个字段', 'err'); return; }
    if (orders.some(o => o.status === 'error')) { setStatus('有订单识别失败，请先修复或移除', 'err'); return; }
    const queue = orders.filter(o => o.status === 'ready');
    if (!queue.length) { setStatus('没有待写入的订单', 'err'); return; }

    $('writeAllBtn').disabled = true;
    let successCount = 0;
    for (const o of queue) {
      o.status = 'writing';
      refreshUI();
      try {
        await writeRecords(o.records, mapping);
        o.status = 'done';
        successCount++;
        setStatus(`进度 ${successCount}/${queue.length}：订单 ${o.meta.orderNo} 已写入`);
      } catch (e) {
        o.status = 'ready';
        o.errorMsg = '写入失败：' + (e.message || String(e));
        console.error(e);
        setStatus(`✕ 订单 ${o.meta.orderNo} 写入失败（批量已停止）：${e.message || e}`, 'err');
        refreshUI();
        $('writeAllBtn').disabled = false;
        return;
      }
      refreshUI();
    }
    setStatus(`✓ 全部 ${queue.length} 个订单写入成功`, 'ok');
    $('writeAllBtn').disabled = false;
  }

  async function writeRecords(records, mapping) {
    const table = await window.bitable.base.getActiveTable();
    const idx = {订单编号:0, 电子版版号:1, 款式:2, 颜色:3, 尺码:4, 件数:5, 日期:6};

    // 预先获取每个映射字段的对象和类型
    const fieldList = [];
    for (const [local, fid] of Object.entries(mapping)) {
      const field = await table.getField(fid);
      const ftype = await field.getType();
      fieldList.push({ local, fid, field, ftype });
    }

    console.log('字段类型映射:', fieldList.map(f => `${f.local}:${f.ftype}`).join(', '));

    // 用 field.createCell 构造每行记录的 cells
    const allCellRecords = [];
    for (const row of records) {
      const cells = [];
      for (const { local, field, ftype } of fieldList) {
        const raw = row[idx[local]];
        if (raw === null || raw === undefined || raw === '') continue;

        let input;
        if (ftype === 2) {                         // 数字
          const n = Number(raw);
          if (isNaN(n)) continue;
          input = n;
        } else if (ftype === 5) {                  // 日期：毫秒时间戳
          const d = new Date(String(raw) + 'T00:00:00');
          if (isNaN(d.getTime())) continue;
          input = d.getTime();
        } else {
          // 文本/单选/多选/其他：传字符串，让 SDK 内部按字段类型处理
          input = String(raw);
        }

        try {
          const cell = await field.createCell(input);
          cells.push(cell);
        } catch (e) {
          console.warn(`字段 ${local}(type=${ftype}) createCell 失败，input=`, input, e);
        }
      }
      allCellRecords.push(cells);
    }

    console.log(`准备写入 ${allCellRecords.length} 条，第一条 cells 数量:`, allCellRecords[0]?.length);

    const BATCH = 500;
    for (let i = 0; i < allCellRecords.length; i += BATCH) {
      const chunk = allCellRecords.slice(i, i + BATCH);
      await table.addRecords(chunk);
    }
  }

  $('writeAllBtn').addEventListener('click', writeAll);

  function setSdkStatus(msg, type) {
    const banner = $('sdkBanner');
    $('sdkStatus').textContent = msg;
    if (type === 'ok') { banner.style.background = '#e8f6ea'; banner.style.color = '#1a7f3e'; banner.style.border = '1px solid #95d5a6'; }
    else if (type === 'err') { banner.style.background = '#fff0f0'; banner.style.color = '#c64040'; banner.style.border = '1px solid #ffa7a7'; $('sdkDetails').style.display = 'block'; }
    else { banner.style.background = '#fff4e5'; banner.style.color = '#8a5a00'; banner.style.border = '1px solid #ffd591'; }
    if (window.__sdkLog) $('sdkLog').textContent = window.__sdkLog.join('\n');
  }

  async function loadFeishuFields() {
    setSdkStatus('连接表格中…');
    try {
      if (!window.bitable || !window.bitable.base) { setSdkStatus('SDK 未加载', 'err'); return; }
      const table = await window.bitable.base.getActiveTable();
      if (!table) { setSdkStatus('未获取到当前表', 'err'); return; }
      const tableName = await table.getName().catch(()=>'未知');
      const fields = await table.getFieldMetaList();
      if (!fields || !fields.length) { setSdkStatus(`表「${tableName}」字段数为 0`, 'err'); return; }
      feishuFields = fields;
      setSdkStatus(`✓ 已连接表「${tableName}」，共 ${fields.length} 个字段`, 'ok');
      refreshUI();
    } catch(e) {
      setSdkStatus('连接失败：' + (e.message || String(e)), 'err');
      console.error(e);
    }
  }

  $('reloadBtn').addEventListener('click', loadFeishuFields);
  window.addEventListener('sdk-ready', loadFeishuFields);
  window.addEventListener('sdk-error', () => setSdkStatus('SDK 加载失败', 'err'));

  if (window.__sdkLoaded) loadFeishuFields();
  else if (window.__sdkError) setSdkStatus('SDK 加载失败', 'err');
  else {
    setSdkStatus('SDK 加载中…');
    setTimeout(() => {
      if (!window.bitable && !window.__sdkError) setSdkStatus('SDK 加载超时', 'err');
    }, 15000);
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
})();
</script>
</body>
</html>
